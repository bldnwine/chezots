# --- Hardware Decoding ---
# Tell mpv to pick the best available hardware decoding method
hwdec=auto-safe

# --- Video Output (GPU) ---
# Recommended modern GPU output for best performance
vo=gpu-next
# Explicitly set the GPU API to OpenGL for your Intel GPU
gpu-api=opengl
# Essential for proper Wayland fullscreen behavior and context
gpu-context=wayland

# --- Scaling & Performance ---
# Use the 'fast' profile for a good balance of quality and speed
profile=fast
# A simple and fast chroma upscaler
cscale=bilinear

# --- Audio Output ---
# Use your preferred audio output (e.g., pipewire or pulse)
# ao=pulse
ao=pipewire

target-colorspace-hint=no
