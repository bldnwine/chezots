# Aether Theme
source = /home/bldnwine/.config/aether/theme/hyprland.conf

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################
monitor=eDP-1,1920x1080@60.01Hz,auto,1
# See https://wiki.hypr.land/Configuring/Monitors/
monitor=HDMI-A-1,1920x1080@60,1920x0,1

xwayland {
  force_zero_scaling = true
}


###################
### MY PROGRAMS ###
###################

env = MOZ_ENABLE_WAYLAND,1

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = nautilus
$menu = tofi-drun


#################
### AUTOSTART ###
#################

# Import environment for systemd user services
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_RUNTIME_DIR DBUS_SESSION_BUS_ADDRESS

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store
#exec-once = walker --gapplication-service

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
#exec-once = sleep 5 && swww-daemon && waypaper --restore
exec-once = playerctld
exec-once = hypridle
exec-once = brightnessctl set 45%
exec-once = notifier start
exec-once = swaybg -i ~/.config/omarchy/current/background -m fill
exec-once = avizo-service

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = HYPRCURSOR_SIZE,24


